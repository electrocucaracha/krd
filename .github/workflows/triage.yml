name: Triage
# yamllint disable-line rule:truthy
on: [pull_request]
jobs:
  assign-label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@bf12e9b00b37c5c0ca2b87b79b2daf7891dbda13 # 7.0.0
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
